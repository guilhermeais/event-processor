version: "3.8"
services:
  trino:
    container_name: event-processor-trino
    image: trinodb/trino:latest
    ports:
      - "8081:8080"
    volumes:
      - ./catalog:/etc/trino/catalog
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION-us-east-1}
